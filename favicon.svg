<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <rect width="100" height="100" rx="18" fill="#9440dd"/>

  <!-- N hand-drawn : bottom-left → top-left → bottom-right → top-right -->
  <polyline points="20,65 23,17 55,65 58,17"
    fill="none" stroke="#ffcc33" stroke-width="11.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rayons de soleil — origine coin bas-droite (88,91) -->
  <g stroke="#ffcc33" stroke-linecap="round" fill="none">
    <!-- 4 rayons droits -->
    <line x1="88" y1="91" x2="69" y2="67" stroke-width="5.5"/>
    <line x1="88" y1="91" x2="61" y2="73" stroke-width="5.5"/>
    <line x1="88" y1="91" x2="55" y2="80" stroke-width="5.5"/>
    <line x1="88" y1="91" x2="52" y2="87" stroke-width="5.5"/>
    <!-- Arc courbe bas (soleil levant) -->
    <path d="M 56,96 Q 70,100 82,94" stroke-width="6.5" fill="none"/>
  </g>
</svg>
